name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    name: Web → gh-pages
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build web
        run: make build-web

      - name: Deploy to gh-pages branch
        if: github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: enfr/build/web
          publish_branch: gh-pages

  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build APK
        run: make build-android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: enfr-debug
          path: enfr/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
