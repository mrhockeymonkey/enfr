name: Build

on:
  push:
    branches: [main]

jobs:
  web:
    name: Web → gh-pages
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get
        working-directory: enfr

      - name: Build web
        run: flutter build web
        working-directory: enfr

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: enfr/build/web
          publish_branch: gh-pages

  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get
        working-directory: enfr

      - name: Build APK
        run: flutter build apk --debug
        working-directory: enfr

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: enfr-debug
          path: enfr/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
